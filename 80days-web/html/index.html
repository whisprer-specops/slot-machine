button{font-family:inherit;cursor:pointer;transition:filter 0.15s,transform 0.1s}
button:hover:not(:disabled){filter:brightness(1.15)}

button:disabled{opacity:0.4;cursor:not-allowed}
::-webkit-scrollbar{width:3px}

@keyframes celebPulse{0%{transform:scale(0.8);opacity:0}50%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes coordFlash{0%{opacity:0;transform:translateY(4px)}100%{opacity:1;transform:translateY(0)}}

<body>
<div id="root"></div>
<script type="text/babel">
const API = '';  // Same origin — no prefix needed

// ═══════════════════════════════════════════════════════════
// SOUND ENGINE — Asymmetric audio design via Tone.js
// Wins get celebratory tones. Losses get SILENCE. 
// This asymmetry is one of the most powerful subconscious
// manipulators in slot design.
// ═══════════════════════════════════════════════════════════
let synthsReady = false, synth, bellSynth, noiseSynth;

function initAudio() {
  if (synthsReady) return;
  try {
    synth = new Tone.PolySynth(Tone.Synth, {
      oscillator: { type: "triangle" },
      envelope: { attack: 0.01, decay: 0.2, sustain: 0.1, release: 0.3 },
      volume: -18,
    }).toDestination();
    bellSynth = new Tone.PolySynth(Tone.Synth, {
      oscillator: { type: "sine" },
      envelope: { attack: 0.005, decay: 0.4, sustain: 0, release: 0.5 },
      volume: -20,
    }).toDestination();
    noiseSynth = new Tone.NoiseSynth({
      noise: { type: "pink" },
      envelope: { attack: 0.001, decay: 0.05, sustain: 0, release: 0.02 },
      volume: -30,
    }).toDestination();
    synthsReady = true;
  } catch(e) { console.warn("Audio init failed:", e); }
}

function playReelStop(reelIndex) {
  if (!synthsReady) return;
  try {
    const notes = ["C3", "D3", "E3", "F3"];
    bellSynth.triggerAttackRelease(notes[reelIndex], "16n", Tone.now(), 0.3);
    noiseSynth.triggerAttackRelease("32n");
  } catch(e) {}
}

function playWinSound(ratio) {
  if (!synthsReady || ratio <= 0) return;
  try {
    const n = Tone.now();
    if (ratio >= 20) {
      // MEGA — full arpeggio + octave
      synth.triggerAttackRelease("C4", "8n", n, 0.5);
      synth.triggerAttackRelease("E4", "8n", n + 0.1, 0.5);
      synth.triggerAttackRelease("G4", "8n", n + 0.2, 0.5);
      synth.triggerAttackRelease("C5", "4n", n + 0.3, 0.6);
      bellSynth.triggerAttackRelease("C6", "2n", n + 0.4, 0.3);
    } else if (ratio >= 5) {
      // BIG — major chord
      synth.triggerAttackRelease("C4", "8n", n, 0.4);
      synth.triggerAttackRelease("E4", "8n", n + 0.08, 0.4);
      synth.triggerAttackRelease("G4", "8n", n + 0.16, 0.4);
      bellSynth.triggerAttackRelease("C5", "4n", n + 0.24, 0.3);
    } else if (ratio >= 1) {
      // True win — ascending dyad
      synth.triggerAttackRelease("E4", "16n", n, 0.3);
      synth.triggerAttackRelease("G4", "16n", n + 0.08, 0.3);
    } else {
      // LDW — muted single note (still "sounds like a win")
      synth.triggerAttackRelease("C4", "16n", n, 0.15);
    }
  } catch(e) {}
}

function playBonusFanfare() {
  if (!synthsReady) return;
  try {
    const n = Tone.now();
    bellSynth.triggerAttackRelease("G5", "8n", n, 0.4);
    bellSynth.triggerAttackRelease("B5", "8n", n + 0.15, 0.4);
    bellSynth.triggerAttackRelease("D6", "4n", n + 0.3, 0.5);
  } catch(e) {}
}

function playGambleWin() {
  if (!synthsReady) return;
  try {
    const n = Tone.now();
    synth.triggerAttackRelease("C5", "8n", n, 0.4);
    synth.triggerAttackRelease("E5", "8n", n + 0.1, 0.4);
    synth.triggerAttackRelease("G5", "4n", n + 0.2, 0.5);
  } catch(e) {}
}

function playGambleLoss() {
  if (!synthsReady) return;
  try { synth.triggerAttackRelease("C3", "4n", Tone.now(), 0.5); } catch(e) {}
}

// Losses: SILENCE. This IS the sound design. Nothing to hear.

function App() {

    {emoji:"🏜️",name:"Sahara"},{emoji:"🌊",name:"Pacific"},{emoji:"❄️",name:"Siberia"},
    {emoji:"🏖️",name:"Copa"},{emoji:"🏰",name:"Castle"},{emoji:"🌳",name:"Amazon"},

  async function doSpin(isAuto = false) {

    if (soundOn && !synthsReady) { await Tone.start(); initAudio(); }

    const maxCyc = Math.max(...reelStop) + 2;

    // Fire API call in parallel with animation
    const spinPromise = fetch(API + '/api/spin', {

          if (cycles === reelStop[r]) playReelStop(r);
        }

        if (cycles >= reelStop[r] && result) return result.grid[r];

        clearInterval(animTimer);
        finishDisplay(result);
      }

    // Wait for API response
    try {
      result = await spinPromise;
      if (!result.ok && result.error) {
        clearInterval(animTimer);
        setSpinning(false);
        setMsg(result.error);
        setDispGrid(null);
        return;
      }
    } catch(e) {
      clearInterval(animTimer);
      setSpinning(false);
      setMsg("Connection lost!");
      setDispGrid(null);
      return;
    }

    // If animation already finished, apply immediately
    if (cycles >= maxCyc) {
      clearInterval(animTimer);
      finishDisplay(result);
    }
  }

    setNearMiss(r.near_miss);
    setOutcome(r.outcome);

    // Celebration
    if (r.celeb_level > 0 && celebOn) {

        `+${fv(r.total_win, creditOn)}`
      );
      setTimeout(() => setShowCeleb(false), r.celeb_level >= 4 ? 2500 : 1000);
    }

    // Sound — wins get music, losses get SILENCE (asymmetric audio)
    if (soundOn && synthsReady) {
      if (r.total_win > 0) playWinSound(r.total_win / r.state.bet);
      if (r.bonus_triggered) setTimeout(() => playBonusFanfare(), 300);
    }

    // Message
    if (r.bonus_triggered) {
      setBonusActive(true);
      setMsg("✈️ BONUS TRIGGERED!");
    } else if (r.state.free_spins_left > 0) {
      setMsg(`Free voyage — ${r.state.free_spins_left} left`);
    } else if (r.state.free_spins_left === 0 && r.state.free_spins_won > 0) {
      setMsg(`Journey complete! Won ${fv(r.state.free_spins_won, creditOn)}`);
    } else if (r.total_win > 0) {
      if (!ldwOn && r.outcome === "LDW") {
        setMsg(`${fv(r.total_win, creditOn)} (NET: -${fv(r.state.bet - r.total_win, false)})`);
      } else {
        setMsg(`WIN ${fv(r.total_win, creditOn)}${r.multiplier > 1 ? ` ×${r.multiplier}` : ''}`);
      }
    } else {
      if (celebOn) setMsg(""); else setMsg(`Lost ${fv(r.state.bet, creditOn)}`);
    }

    setSpinning(false);

    // Autoplay
    if (autoRef.current && !r.bonus_triggered && r.state.balance >= r.state.bet) {
      tmRef.current = setTimeout(() => { if (autoRef.current) doSpin(true); }, 500);
    } else if (autoRef.current) {
      setAutoPlay(false);
    }
  }

    const r = await fetch(API + '/api/bonus/collect', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ session_id: sid }),
    }).then(r => r.json());
    setSt(r.state);
    setBonusActive(false);
    setMsg(r.message);
  }

  async function handleBonusGamble() {
    setBonusGambling(true);
    const r = await fetch(API + '/api/bonus/gamble', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ session_id: sid }),

    setTimeout(() => {
      setSt(r.state);
      setBonusResult(r.success ? "win" : "lose");
      setBonusGambling(false);
      setMsg(r.message);
      // Sound — celebrate safe landing or mourn the crash
      if (soundOn && synthsReady) {
        if (r.success) playGambleWin(); else playGambleLoss();

      if (!r.success || r.spins_awarded > 0) {
        setTimeout(() => { setBonusActive(false); setBonusResult(null); }, 2000);
      }
    }, 1200);
  }

    await fetch(API + '/api/bet', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ session_id: sid, bet: b }),
    }).then(r => r.json()).then(s => setSt(s));
  }

  async function resetSession() {
    if (!sid) return;
    await fetch(API + '/api/reset', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ session_id: sid }),
    }).then(r => r.json()).then(s => { setSt(s); setMsg("Chart your course, spin the globe"); setGrid(null); setWins([]); setTotalWin(0); setSpinCoords(null); });
  }

  if (!st) return React.createElement('div', {style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'#c49a6c',fontSize:'1rem',fontStyle:'italic'}}, msg || "Connecting to engine...");

  const dg = dispGrid || grid;
  const hl = new Set();
